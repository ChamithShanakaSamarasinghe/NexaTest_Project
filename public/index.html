<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SRS Automation Platform</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🚀 SRS Automation Platform (AI Powered)</h1>

    <div class="upload-box">
      <input type="file" id="fileInput" multiple />
      <button onclick="processFiles()">🚀 Process All Inputs</button>
    </div>

    <div id="status"></div>

    <div class="stats">
      <div class="card" id="reqCount">📌 Requirements: 0</div>
      <div class="card" id="featureCount">✨ Features: 0</div>
      <div class="card" id="clusterCount">🧠 Clusters: 0</div>
      <div class="card" id="testCount">🧪 Test Cases: 0</div>
    </div>

    <div id="output"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
